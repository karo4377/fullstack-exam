# E2E tests recorded to Cypress Cloud (project nj41qj).
#
# Production uses Neon + Render + Vercel. CI runs on a fresh GitHub runner with
# nothing pre-installed, so we start a temporary Postgres service here and run
# the API + frontend locally inside the job. That keeps tests fast, isolated,
# and independent of Render cold starts or production data.

name: Cypress E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  cypress:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: artshop
          POSTGRES_PASSWORD: artshop
          POSTGRES_DB: artshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U artshop -d artshop"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://artshop:artshop@localhost:5432/artshop
      JWT_SECRET: ci-cypress-secret
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      PORT: '3001'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install & prepare API
        working-directory: backend
        run: |
          npm ci
          npx prisma migrate deploy
          npm run seed
          npm run build

      - name: Start API
        working-directory: backend
        env:
          NODE_ENV: production
        run: npm run start &

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/products > /dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready"
          exit 1

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Start frontend
        working-directory: frontend
        env:
          NODE_ENV: production
        run: npm start &

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready"
          exit 1

      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          working-directory: frontend
          install: false
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
